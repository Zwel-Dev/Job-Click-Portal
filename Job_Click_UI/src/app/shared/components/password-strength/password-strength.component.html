@if (password()) {
  <div class="pw" [attr.data-level]="strength().level">
    <div class="pw__bars" role="presentation">
      @for (segment of segments; track segment) {
        <span class="pw__bar" [class.pw__bar--on]="segment < strength().filled"></span>
      }
    </div>
    <span class="pw__label">{{ strength().label }}</span>
  </div>
}
