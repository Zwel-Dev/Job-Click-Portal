<h2 mat-dialog-title class="preview__title">{{ data.resume.fileName }}</h2>
<mat-dialog-content class="preview">
  <iframe class="preview__frame" [src]="safeUrl" title="Resume preview"></iframe>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close>Close</button>
</mat-dialog-actions>
