<h2 mat-dialog-title>Add to talent pool</h2>

<mat-dialog-content>
  <p class="atp__intro">Add <strong>{{ data.candidateName }}</strong> to one or more pools.</p>

  @if (loading()) {
    <app-skeleton height="120px" radius="var(--jc-radius-md)" />
  } @else {
    @if (pools().length) {
      <mat-selection-list [(ngModel)]="selectedPoolIds" class="atp__list">
        @for (pool of pools(); track pool.id) {
          <mat-list-option [value]="pool.id">
            {{ pool.name }}
            <span class="atp__count">{{ pool.candidateCount }}</span>
          </mat-list-option>
        }
      </mat-selection-list>
    } @else {
      <p class="atp__empty">No pools yet — create one below.</p>
    }

    <mat-form-field appearance="outline" class="atp__new">
      <mat-label>Or create a new pool</mat-label>
      <input matInput [(ngModel)]="newPoolName" placeholder="New pool name" maxlength="60" />
    </mat-form-field>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" type="button" [disabled]="!canSubmit" (click)="add()">Add</button>
</mat-dialog-actions>
