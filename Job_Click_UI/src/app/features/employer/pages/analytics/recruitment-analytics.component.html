@if (analytics(); as data) {
  <app-page-header title="Analytics" [subtitle]="'Recruitment performance · ' + data.periodLabel" />
  <app-analytics-view [data]="data" />
} @else if (loading()) {
  <app-page-header title="Analytics" subtitle="Recruitment performance" />
  <div class="an__kpis">
    @for (item of skeletons; track item) {
      <app-skeleton height="104px" radius="var(--jc-radius-md)" />
    }
  </div>
} @else if (error()) {
  <app-error-state [message]="error()!" (retry)="load()" />
}
