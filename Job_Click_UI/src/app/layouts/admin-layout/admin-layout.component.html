<mat-sidenav-container class="shell">
  <mat-sidenav
    #sidenav
    class="shell__sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
  >
    <div class="shell__brand">
      <app-logo [size]="32" />
      <span class="shell__brand-tag">Admin</span>
    </div>
    <nav class="shell__nav">
      @for (item of nav; track item.route) {
        @if (item.group) {
          <span class="shell__nav-group">{{ item.group }}</span>
        }
        <a
          class="shell__nav-item"
          [routerLink]="item.route"
          routerLinkActive="shell__nav-item--active"
          (click)="isHandset() && sidenav.close()"
        >
          <mat-icon aria-hidden="true">{{ item.icon }}</mat-icon>
          <span class="shell__nav-label">{{ item.label }}</span>
          @if (badgeCount(item); as count) {
            <span class="shell__nav-badge" [attr.aria-label]="count + ' pending'">{{ count }}</span>
          }
        </a>
      }
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="shell__content">
    <header class="shell__header">
      @if (isHandset()) {
        <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle navigation">
          <mat-icon>menu</mat-icon>
        </button>
      }

      <span class="shell__workspace">
        <mat-icon aria-hidden="true">admin_panel_settings</mat-icon>
        Platform console
      </span>

      <span class="shell__spacer"></span>

      <button mat-button class="shell__user" [matMenuTriggerFor]="userMenu">
        <span class="shell__avatar">{{ initials() }}</span>
        <span class="shell__user-name">{{ currentUser.displayName() }}</span>
        <mat-icon>arrow_drop_down</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <div class="shell__menu-head">
          <div class="shell__menu-name">{{ currentUser.displayName() }}</div>
          <div class="shell__menu-role">Platform Admin</div>
        </div>
        <button mat-menu-item type="button" (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sign out</span>
        </button>
      </mat-menu>
    </header>

    <main class="shell__main">
      <div class="shell__container">
        <router-outlet />
      </div>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
